<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Frantz DevTool Suite: free, privacy-first developer tools. 11 tools including AI model comparison, regex tester, cron builder, JWT inspector, color palette studio, and more.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Frantz DevTool Suite">
<meta property="og:description" content="Free, privacy-first developer tools — 11 tools, one suite. All data stays in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://frantzenterprise.github.io/devtool-suite/">
<meta name="theme-color" content="#282a36">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

<title>Frantz DevTool Suite — Unified Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#282a36;--bg2:#21222c;--surface:#44475a;--surface2:#383a4a;--text:#f8f8f2;--text2:#bd93f9;--muted:#6272a4;
--accent:#bd93f9;--accent2:#ff79c6;--green:#50fa7b;--orange:#ffb86c;--red:#ff5555;--cyan:#8be9fd;--gold:#f1fa8c;
--border:#44475a;--radius:var(--radius-val,10px);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
--tb-dir:column;--tb-wrap:nowrap;--tb-align:center;--tb-pad:6px 10px;--tb-gap:4px;--tb-w:100%;--tb-h:auto;--tb-flex:0 0 auto;
--content-dir:column;--content-h:calc(100vh - 46px);--content-oh:hidden;
--tb-border-bottom:1px solid var(--border);--tb-border-right:none;
--toolbar-w:100%;--toolbar-h:auto;--tb-br:0;
--radius-val:0px
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--surface);border-radius:3px}
/* Toolbar */
#toolbar{position:fixed;display:flex;flex-direction:var(--tb-dir);flex-wrap:var(--tb-wrap);align-items:var(--tb-align);padding:var(--tb-pad);gap:var(--tb-gap);background:var(--bg2);z-index:1000;border-bottom:var(--tb-border-bottom);border-right:var(--tb-border-right);min-height:40px;cursor:grab;resize:both;overflow:hidden}
#toolbar.resizing{cursor:nw-resize}
#toolbar.dragging{cursor:grabbing}
.tb-inner{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;width:100%}
/* Tabs */
.tabs-scroll{display:flex;gap:2px;overflow-x:auto;flex:1;min-width:0;padding:0 2px}
.tab{padding:4px 9px;border-radius:6px 6px 0 0;font-size:.65rem;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;background:var(--surface);color:var(--muted);border:1px solid transparent;border-bottom:none;max-width:140px;flex-shrink:0}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--border);position:relative}
.tab .icon{font-size:.7rem}
.tab .close{margin-left:2px;font-size:.55rem;opacity:.5;cursor:pointer;border-radius:3px;padding:0 2px}
.tab .close:hover{opacity:1;background:var(--red);color:#fff}
.tab .label{overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;line-height:1.2}
.tab-add{display:flex;align-items:center;justify-content:center;gap:3px;padding:4px 12px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;flex-shrink:0;line-height:1.2;box-shadow:0 0 10px rgba(189,147,249,.3);transition:all .2s}
.tab-add:hover{box-shadow:0 0 18px rgba(189,147,249,.6);transform:scale(1.05)}
.tab-add .pulse{display:inline-block;animation:pulseBtn 2s ease-in-out infinite}
@keyframes pulseBtn{0%,100%{opacity:1}50%{opacity:.5}}
.tab-add .hotkey{font-size:.5rem;opacity:.7;font-weight:400}
/* Context menu */
.context-menu{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px 0;min-width:120px;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.6);display:none}
.context-menu .item{padding:5px 12px;font-size:.65rem;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px}
.context-menu .item:hover{background:var(--surface2)}
.context-menu .sep{height:1px;background:var(--border);margin:3px 8px}
/* Content */
#content{position:fixed;top:0;left:0;right:0;bottom:0;padding-top:46px;display:flex;flex-direction:var(--content-dir);overflow:hidden}
.legal-bar{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:4px 10px;font-size:.48rem;color:var(--muted);background:var(--bg2);border-top:1px solid var(--border);z-index:999;display:flex;justify-content:center;gap:10px}
.legal-bar a{color:var(--muted);text-decoration:none}
.legal-bar a:hover{color:var(--accent)}
.legal-bar .sep{opacity:.3}
iframe{width:100%;height:100%;border:none;background:var(--bg)}
.welcome-message{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;padding:20px}
.welcome-message h2{color:var(--text2);font-size:1.2rem;font-weight:600}
.welcome-message p{font-size:.78rem;max-width:400px;line-height:1.6}
.welcome-message .icon{font-size:3rem;margin-bottom:6px}
/* Tool grid in add-tab drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1500;display:none}
.drawer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:680px;max-height:80vh;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);z-index:1501;display:none;overflow-y:auto;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.drawer h3{font-size:.85rem;color:var(--text2);margin-bottom:10px}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.tool-grid .item{padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .2s;background:var(--surface)}
.tool-grid .item:hover{border-color:var(--accent);background:var(--surface2)}
.tool-grid .item .ic{font-size:1.2rem;margin-bottom:3px}
.tool-grid .item .nm{font-size:.65rem;font-weight:600}
.tool-grid .item .st{font-size:.5rem;color:var(--muted);margin-top:2px}
.drawer-close{float:right;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:.6rem}
.drawer-close:hover{background:var(--surface2)}
/* Position indicators */
.pos-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.55rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pos-btn:hover{border-color:var(--accent);color:var(--accent)}
.pos-btn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.tier-badge{padding:2px 8px;border-radius:10px;font-size:.5rem;font-weight:600;background:#50fa7b20;color:var(--green);cursor:pointer;white-space:nowrap;flex-shrink:0}
.resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nw-resize;opacity:0;background:linear-gradient(135deg,transparent 40%,var(--accent) 40%,var(--accent) 55%,transparent 55%)}
#toolbar:hover .resize-handle{opacity:.4}
#resizer{position:fixed;z-index:9999;background:var(--accent);opacity:.4;display:none;pointer-events:none}
.login-area{display:flex;align-items:center;gap:4px;flex-shrink:0}
.login-btn{font-size:.5rem;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
.login-btn:hover{border-color:var(--accent);color:var(--text)}
@media(max-width:600px){.tb-inner{flex-wrap:wrap;gap:3px}.tab{font-size:.6rem;padding:3px 6px;max-width:100px}}
</style></head>
<body>
<!-- Toolbar -->
<div id="toolbar">
<div class="tb-inner">
<span style="font-weight:700;font-size:.75rem;flex-shrink:0;display:flex;align-items:center;gap:4px">⚡<span style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">DevTools</span></span>
<div class="tabs-scroll" id="tabBar"></div>
<button class="tab-add" onclick="showDrawer()" title="Open tool"><span class="pulse">+</span> Tools <span class="hotkey">(11)</span></button>
<span class="tier-badge" id="tBadge" onclick="cycleTier()">🆓 Free</span>
</div>
<div style="display:flex;gap:3px;align-items:center;flex-shrink:0;margin-top:2px">
<button class="pos-btn" onclick="setPosition('top')" title="Top">⬆</button>
<button class="pos-btn" onclick="setPosition('bottom')" title="Bottom">⬇</button>
<button class="pos-btn" onclick="setPosition('left')" title="Left">⬅</button>
<button class="pos-btn" onclick="setPosition('right')" title="Right">➡</button>
</div>
<div class="resize-handle" id="resizeHandle"></div>
</div>

<!-- Content -->
<div id="content">
<div class="welcome-message" id="welcome">
<div class="icon">⚡</div>
<h2>Frantz DevTool Suite</h2>
<p>Your all-in-one developer toolbox.<br><strong>23 tools</strong> — one unified hub.</p>
<button onclick="showDrawer()" style="margin-top:12px;padding:10px 28px;border-radius:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);box-shadow:0 0 20px rgba(189,147,249,.3);transition:all .2s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">🔧 Open a Tool</button>
<p style="font-size:.6rem;color:var(--muted);margin-top:10px">Drag the toolbar to reposition · Resize from bottom-right</p>
</div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="hideDrawer()"></div>
<div class="drawer" id="drawer">
<button class="drawer-close" onclick="hideDrawer()">✕</button>
<h3>🔧 Choose a Tool</h3>
<div class="tool-grid" id="toolGrid"></div>
</div>

<!-- Context menu -->
<div class="context-menu" id="ctxMenu">
<div class="item" data-action="close">✕ Close</div>
<div class="item" data-action="closeothers">✕ Close Others</div>
<div class="item" data-action="closeall">✕ Close All</div>
<div class="sep"></div>
<div class="item" data-action="reload">🔄 Reload</div>
</div>

<script>
const TOOLS=[
{id:'modelcompare',icon:'📊',name:'AI ModelCompare',desc:'48 AI models, compare, search',url:'https://frantzenterprise.github.io/ai-model-compare/'},
{id:'apicalc',icon:'💰',name:'API Cost Calc',desc:'Cost projection by provider',url:'https://frantzenterprise.github.io/devtool-apicalc/'},
{id:'promptbench',icon:'🧪',name:'Prompt Bench',desc:'Test models side-by-side',url:'https://frantzenterprise.github.io/devtool-promptbench/'},
{id:'crontab',icon:'⏰',name:'Crontab Guru',desc:'Visual cron builder',url:'https://frantzenterprise.github.io/devtool-crontabguru/'},
{id:'regex',icon:'🔍',name:'Regex Builder',desc:'Real-time regex tester',url:'https://frantzenterprise.github.io/devtool-regexbuilder/'},
{id:'jwt',icon:'🔐',name:'JWT Inspector',desc:'Decode & inspect tokens',url:'https://frantzenterprise.github.io/devtool-jwtinspector/'},
{id:'palette',icon:'🎨',name:'Palette Studio',desc:'Color palette generator',url:'https://frantzenterprise.github.io/devtool-palettestudio/'},
{id:'jsoncsv',icon:'🔄',name:'JSON ↔ CSV',desc:'Convert between formats',url:'https://frantzenterprise.github.io/devtool-jsoncsv/'},
{id:'anim',icon:'✨',name:'Anim Studio',desc:'Text & image animations',url:'https://frantzenterprise.github.io/devtool-animstudio/'},
{id:'git',icon:'🌿',name:'Git Builder',desc:'Visual git commands',url:'https://frantzenterprise.github.io/devtool-gitbuilder/'},
{id:'ipnet',icon:'🌐',name:'IP Network',desc:'Subnet, DNS, WHOIS, ports',url:'https://frantzenterprise.github.io/devtool-ipnet/'},
{id:'filetrans',icon:'📎',name:'File Transformer',desc:'MD to TXT/HTML, Base64, Text to ZIP',url:'https://frantzenterprise.github.io/devtool-filetransformer/'},
{id:'uuidgen',icon:'🔢',name:'UUID Generator',desc:'v1/v4/v7 UUIDs, formats, decode timestamp',url:'https://frantzenterprise.github.io/devtool-uuidgen/'},
{id:'lorem',icon:'📝',name:'Lorem Ipsum',desc:'Classic, Hipster, Zombie, Cat Ipsum - 5 styles',url:'https://frantzenterprise.github.io/devtool-loremipsum/'},
{id:'httpcodes',icon:'🌐',name:'HTTP Status Codes',desc:'63 status codes, search, filter, RFC',url:'https://frantzenterprise.github.io/devtool-httpcodes/'},
{id:'minifier',icon:'🗜️',name:'HTML/CSS Minifier',desc:'Strip whitespace, comments, condense colors',url:'https://frantzenterprise.github.io/devtool-minifier/'},
{id:'timestamp',icon:'🔧',name:'Timestamp Converter',desc:'Unix to date, timezone-aware, relative time',url:'https://frantzenterprise.github.io/devtool-timestamp/'},
{id:'diffchecker',icon:'🏳️',name:'Diff Checker',desc:'Line/word/char diff with color highlights',url:'https://frantzenterprise.github.io/devtool-diffchecker/'},
{id:'baseconv',icon:'🔢',name:'Base Converter',desc:'Binary, octal, decimal, hex, custom bases',url:'https://frantzenterprise.github.io/devtool-baseconv/'},
{id:'urldecode',icon:'🔗',name:'URL Encoder/Decoder',desc:'Encode, decode, query string parser',url:'https://frantzenterprise.github.io/devtool-urldecode/'},
{id:'csvviewer',icon:'📊',name:'CSV Viewer',desc:'Paste CSV, sort, search, export JSON',url:'https://frantzenterprise.github.io/devtool-csvviewer/'},
{id:'textcleaner',icon:'🧹',name:'Text Cleaner',desc:'Trim, dedupe, sort, case, whitespace',url:'https://frantzenterprise.github.io/devtool-textcleaner/'},
{id:'passgen',icon:'🔑',name:'Password Generator',desc:'Strong passwords, bulk mode, history',url:'https://frantzenterprise.github.io/devtool-passgen/'}
]

let state={
tier:'free',
tabs:JSON.parse(localStorage.getItem('uh_tabs')||'[]'),
activeTab:localStorage.getItem('uh_active')||null,
position:localStorage.getItem('uh_pos')||'top',
}
let ctxTabIdx=null

function init(){
renderToolGrid()
renderTabs()
applyPosition(state.position)
document.getElementById('toolbar').addEventListener('mousedown',startDrag)
document.getElementById('resizeHandle').addEventListener('mousedown',startResize)
document.addEventListener('mousemove',onMove)
document.addEventListener('mouseup',onUp)
document.getElementById('ctxMenu').addEventListener('click',onCtxAction)
// Auto-open saved tabs
if(state.tabs.length>0){
state.tabs.forEach((t,i)=>{if(t.id===state.activeTab)switchTab(i)})
if(!document.querySelector('.tab.active'))switchTab(0)
}
}

function renderToolGrid(){
const grid=document.getElementById('toolGrid')
grid.innerHTML=TOOLS.map(t=>`<div class="item" onclick="openTool('${t.id}')"><div class="ic">${t.icon}</div><div class="nm">${t.name}</div><div class="st">${t.desc}</div></div>`).join('')
}

function renderTabs(){
const bar=document.getElementById('tabBar')
if(state.tabs.length===0){bar.innerHTML='<span style="color:var(--muted);font-size:.6rem;padding:2px 6px">No tabs</span>';return}
bar.innerHTML=state.tabs.map((t,i)=>{
const isActive=i===state.tabs.findIndex((_,idx)=>idx===state.tabs.length-1&&state.activeTab===t.id)||state.activeTab===t.id&&i===state.tabs.findIndex(x=>x.id===t.id)
return `<div class="tab${isActive?' active':''}" data-idx="${i}" onclick="switchTab(${i})" oncontextmenu="showCtx(event,${i})"><span class="icon">${t.icon||'📄'}</span><span class="label">${t.name}</span><span class="close" onclick="event.stopPropagation();closeTab(${i})">✕</span></div>`
}).join('')
}

function openTool(id){
hideDrawer()
const tool=TOOLS.find(t=>t.id===id)
if(!tool)return
// Check if already open
const existing=state.tabs.findIndex(t=>t.id===id)
if(existing>=0){switchTab(existing);return}
state.tabs.push({id:tool.id,icon:tool.icon,name:tool.name,url:tool.url})
state.activeTab=tool.id
saveState()
renderTabs()
switchTab(state.tabs.length-1)
}

function switchTab(idx){
if(idx<0||idx>=state.tabs.length)return
const tab=state.tabs[idx]
state.activeTab=tab.id
saveState()
renderTabs()
const content=document.getElementById('content')
// Remove welcome
const w=document.getElementById('welcome')
if(w)w.remove()
// Remove old iframe
const old=content.querySelector('iframe')
if(old)old.remove()
const iframe=document.createElement('iframe')
iframe.src=tab.url
iframe.allow='clipboard-read; clipboard-write'
content.appendChild(iframe)
}

function closeTab(idx){
if(idx<0||idx>=state.tabs.length)return
state.tabs.splice(idx,1)
if(state.tabs.length===0){
state.activeTab=null
document.getElementById('content').innerHTML=`<div class="welcome-message" id="welcome"><div class="icon">⚡</div><h2>Frantz DevTool Suite</h2><p>Your all-in-one developer toolbox.<br><strong>23 tools</strong> — one unified hub.</p><button onclick="showDrawer()" style="margin-top:12px;padding:10px 28px;border-radius:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);box-shadow:0 0 20px rgba(189,147,249,.3)">🔧 Open a Tool</button><p style="font-size:.6rem;color:var(--muted);margin-top:10px">Drag the toolbar to reposition · Resize from bottom-right</p></div>`
}else{
state.activeTab=state.tabs[Math.min(idx,state.tabs.length-1)].id
switchTab(state.tabs.findIndex(t=>t.id===state.activeTab))
}
saveState()
renderTabs()
}

function showCtx(e,idx){
e.preventDefault()
ctxTabIdx=idx
const menu=document.getElementById('ctxMenu')
menu.style.display='block'
menu.style.left=e.clientX+'px'
menu.style.top=e.clientY+'px'
}

function onCtxAction(e){
const action=e.target.dataset.action
if(!action)return
document.getElementById('ctxMenu').style.display='none'
if(action==='close'){closeTab(ctxTabIdx)}
else if(action==='closeothers'){
const keep=ctxTabIdx
state.tabs=[state.tabs[keep]]
state.activeTab=state.tabs[0].id
switchTab(0)
saveState()
renderTabs()
}else if(action==='closeall'){
state.tabs=[]
state.activeTab=null
document.getElementById('content').innerHTML=`<div class="welcome-message" id="welcome"><div class="icon">⚡</div><h2>Frantz DevTool Suite</h2><p>Your all-in-one developer toolbox.<br><strong>23 tools</strong> — one unified hub.</p><button onclick="showDrawer()" style="margin-top:12px;padding:10px 28px;border-radius:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);box-shadow:0 0 20px rgba(189,147,249,.3)">🔧 Open a Tool</button><p style="font-size:.6rem;color:var(--muted);margin-top:10px">Drag the toolbar to reposition · Resize from bottom-right</p></div>`
saveState()
renderTabs()
}else if(action==='reload'){
const cur=document.querySelector('iframe')
if(cur)cur.src=cur.src
}
document.getElementById('ctxMenu').style.display='none'
}

function showDrawer(){document.getElementById('drawer').style.display='block';document.getElementById('drawerOverlay').style.display='block'}
function hideDrawer(){document.getElementById('drawer').style.display='none';document.getElementById('drawerOverlay').style.display='none'}

function setPosition(pos){
state.position=pos
localStorage.setItem('uh_pos',pos)
applyPosition(pos)
document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'))
const map={'top':0,'bottom':1,'left':2,'right':3}
const btns=document.querySelectorAll('.pos-btn')
if(btns[map[pos]])btns[map[pos]].classList.add('active')
}

function applyPosition(pos){
const tb=document.getElementById('toolbar')
const ct=document.getElementById('content')
const root=document.documentElement
if(pos==='top'){
root.style.setProperty('--tb-dir','column');root.style.setProperty('--tb-wrap','nowrap');root.style.setProperty('--tb-align','center')
root.style.setProperty('--tb-pad','6px 10px');root.style.setProperty('--tb-w','100%');root.style.setProperty('--tb-h','auto')
root.style.setProperty('--tb-border-bottom','1px solid var(--border)');root.style.setProperty('--tb-border-right','none')
root.style.setProperty('--tb-flex','0 0 auto');root.style.setProperty('--content-dir','column')
root.style.setProperty('--content-h','calc(100vh - 46px)')
tb.style.top='0';tb.style.left='0';tb.style.right='0';tb.style.bottom='auto';tb.style.width='100%';tb.style.height='auto';tb.style.flexDirection='column'
ct.style.paddingTop='46px';ct.style.paddingBottom='0';ct.style.paddingLeft='0';ct.style.paddingRight='0'
}else if(pos==='bottom'){
root.style.setProperty('--tb-dir','column');root.style.setProperty('--tb-wrap','nowrap');root.style.setProperty('--tb-align','center')
root.style.setProperty('--tb-pad','6px 10px');root.style.setProperty('--tb-w','100%');root.style.setProperty('--tb-h','auto')
root.style.setProperty('--tb-border-bottom','none');root.style.setProperty('--tb-border-right','none')
tb.style.top='auto';tb.style.left='0';tb.style.right='0';tb.style.bottom='0';tb.style.width='100%';tb.style.height='auto';tb.style.flexDirection='column'
ct.style.paddingTop='0';ct.style.paddingBottom='46px';ct.style.paddingLeft='0';ct.style.paddingRight='0'
}else if(pos==='left'){
root.style.setProperty('--tb-dir','column');root.style.setProperty('--tb-wrap','wrap');root.style.setProperty('--tb-align','flex-start')
root.style.setProperty('--tb-pad','8px 6px');root.style.setProperty('--tb-w','auto');root.style.setProperty('--tb-h','100%')
root.style.setProperty('--tb-border-bottom','none');root.style.setProperty('--tb-border-right','1px solid var(--border)')
tb.style.top='0';tb.style.left='0';tb.style.right='auto';tb.style.bottom='0';tb.style.width='auto';tb.style.height='100%';tb.style.flexDirection='column'
ct.style.paddingTop='0';ct.style.paddingBottom='0';ct.style.paddingLeft='50px';ct.style.paddingRight='0'
document.querySelectorAll('.tb-inner .tabs-scroll').forEach(e=>e.style.flexDirection='column')
}else if(pos==='right'){
root.style.setProperty('--tb-dir','column');root.style.setProperty('--tb-wrap','wrap');root.style.setProperty('--tb-align','flex-end')
root.style.setProperty('--tb-pad','8px 6px');root.style.setProperty('--tb-w','auto');root.style.setProperty('--tb-h','100%')
root.style.setProperty('--tb-border-bottom','none');root.style.setProperty('--tb-border-right','none')
root.style.setProperty('--tb-border-left','1px solid var(--border)')
tb.style.top='0';tb.style.left='auto';tb.style.right='0';tb.style.bottom='0';tb.style.width='auto';tb.style.height='100%';tb.style.flexDirection='column'
ct.style.paddingTop='0';ct.style.paddingBottom='0';ct.style.paddingLeft='0';ct.style.paddingRight='50px'
}
document.querySelectorAll('.tabs-scroll').forEach(e=>e.style.flexDirection=pos==='left'||pos==='right'?'column':'row')
}

let dragging=false,resizing=false,startX,startY,startRect

function startDrag(e){
if(e.target.closest('.tab,.tab-add,.pos-btn,.tier-badge,.login-btn,.close,.resize-handle'))return
dragging=true
startX=e.clientX;startY=e.clientY
const tb=document.getElementById('toolbar')
startRect=tb.getBoundingClientRect()
tb.classList.add('dragging')
}

function startResize(e){
e.preventDefault();e.stopPropagation()
resizing=true
startX=e.clientX;startY=e.clientY
const tb=document.getElementById('toolbar')
startRect={w:tb.offsetWidth,h:tb.offsetHeight}
tb.classList.add('resizing')
document.getElementById('resizer').style.display='block'
updateResizer(tb.offsetLeft,tb.offsetTop,tb.offsetWidth,tb.offsetHeight)
}

function onMove(e){
if(dragging){
const dx=e.clientX-startX,dy=e.clientY-startY
const tb=document.getElementById('toolbar')
tb.style.left=(startRect.left+dx)+'px'
tb.style.top=(startRect.top+dy)+'px'
}
if(resizing){
const dx=e.clientX-startX,dy=e.clientY-startY
const tb=document.getElementById('toolbar')
const nw=Math.max(100,startRect.w+dx)
const nh=Math.max(40,startRect.h+dy)
updateResizer(tb.offsetLeft,tb.offsetTop,nw,nh)
}
}

function onUp(){
if(dragging){
document.getElementById('toolbar').classList.remove('dragging')
dragging=false
}
if(resizing){
document.getElementById('toolbar').classList.remove('resizing')
const rz=document.getElementById('resizer')
if(rz.style.display!=='none'){
const rect=rz.getBoundingClientRect()
const tb=document.getElementById('toolbar')
tb.style.width=rect.width+'px'
tb.style.height=rect.height+'px'
}
rz.style.display='none'
resizing=false
}
}

function updateResizer(l,t,w,h){
const rz=document.getElementById('resizer')
rz.style.left=l+'px';rz.style.top=t+'px';rz.style.width=w+'px';rz.style.height=h+'px'
}

function cycleTier(){
const tiers=['free','pro','team'];const c=tiers.indexOf(state.tier);state.tier=tiers[(c+1)%tiers.length]
const b=document.getElementById('tBadge')
if(state.tier==='free'){b.textContent='🆓 Free';b.style.background='#50fa7b20';b.style.color='#50fa7b'}
else if(state.tier==='pro'){b.textContent='⚡ Pro';b.style.background='#ff79c620';b.style.color='#ff79c6'}
else{b.textContent='🏢 Team';b.style.background='#ffb86c20';b.style.color='#ffb86c'}
}

function saveState(){
localStorage.setItem('uh_tabs',JSON.stringify(state.tabs))
localStorage.setItem('uh_active',state.activeTab||'')
}

// Click outside closes context menu
document.addEventListener('click',function(e){
if(!e.target.closest('.context-menu'))document.getElementById('ctxMenu').style.display='none'
})

document.addEventListener('DOMContentLoaded',init)
</script>
